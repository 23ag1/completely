# completely — project config. Edit to customize the pipeline. Everything has a sane default,
# so this file is optional; with no [check] table the stack is auto-detected (front + back).

[project]
name = ""
kind = ""            # "new" | "existing" (set by /completely:init)

[stack]
frontend = "auto"    # auto | react | next | vue | svelte | ...
backend  = "auto"    # auto | fastapi | django | express | go | ...

[architecture]
frontend = ""        # fsd | feature-based | atomic | (blank = let init choose best)
backend  = ""        # modular-monolith | layered | hexagonal | (blank = init chooses)

# Quality checks run by `cmpl check`, in order. Omit this table to auto-detect.
